name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml claims requires-python = ">=3.10". Test the
        # full supported range so a 3.10 / 3.11 user doesn't hit a
        # "works on dev's 3.12" regression. Verified locally with uv:
        # 599 tests pass on each.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      # Coverage scoped to kerb_map.modules/ — the brief §6 v1.2
      # acceptance target ("≥60% coverage on kerb_map/modules/").
      # Baseline is ~83%; gate at 65 to leave a regression margin
      # without false-failing on a small refactor.
      - name: pytest --cov
        run: |
          pytest \
            --cov=kerb_map.modules \
            --cov-report=term-missing \
            --cov-fail-under=65

      # Argparse smoke — catches "your CLI doesn't even import" regressions
      # that no unit test would notice.
      - name: CLI smoke
        run: |
          python -c "from kerb_map.cli import build_parser; build_parser().parse_args(['--help'])"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
